<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Twelve Wishes</title>
  <meta name="description" content="Twelve Wishes — 走进森林，寻找 12 朵向日葵。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+SC:wght@400;600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/storybook.css?v=35" />
  <link rel="stylesheet" href="css/loading.css?v=120" />
  <link rel="stylesheet" href="css/welcome.css?v=120" />
  <link rel="stylesheet" href="css/forest.css?v=125" />
  <link rel="stylesheet" href="css/ui.css?v=124" />
  <link rel="stylesheet" href="css/finale.css?v=35" />
</head>
<body>

  <!-- Page 01 — Loading: seed → sunflower -->
  <div class="loading-screen" id="loading-screen">
    <div class="paper-texture"></div>
    <div class="loading-center">
      <div class="flower-stage">
        <svg class="flower-svg" id="flower-growth" viewBox="0 0 80 150" aria-hidden="true">
          <g class="part-seed">
            <ellipse cx="40" cy="132" rx="5.5" ry="4" fill="#5A4028"/>
          </g>
          <g class="part-stem">
            <path d="M40 132 Q43 98 38 68 Q42 42 40 30" stroke="#5A7848" stroke-width="3.5" fill="none" stroke-linecap="round"/>
          </g>
          <g class="part-leaf-l">
            <path d="M40 92 Q18 88 8 74 Q20 82 10 60 Q24 78 40 88" fill="#6B8860" stroke="#4A6741" stroke-width="0.5" stroke-opacity="0.25"/>
          </g>
          <g class="part-leaf-r">
            <path d="M40 78 Q62 72 72 56 Q58 66 66 48 Q52 64 40 74" fill="#6B8860" stroke="#4A6741" stroke-width="0.5" stroke-opacity="0.25"/>
          </g>
          <g class="part-bud">
            <circle cx="40" cy="24" r="5" fill="#8B6838"/>
          </g>
          <g class="part-petals">
            <g class="part-petal part-petal-0"><ellipse cx="40" cy="9" rx="4" ry="12" fill="#F0C848"/></g>
            <g class="part-petal part-petal-1"><ellipse cx="40" cy="9" rx="4" ry="12" fill="#F0C848"/></g>
            <g class="part-petal part-petal-2"><ellipse cx="40" cy="9" rx="4" ry="12" fill="#F0C848"/></g>
            <g class="part-petal part-petal-3"><ellipse cx="40" cy="9" rx="4" ry="12" fill="#F0C848"/></g>
            <g class="part-petal part-petal-4"><ellipse cx="40" cy="9" rx="4" ry="12" fill="#F0C848"/></g>
            <g class="part-petal part-petal-5"><ellipse cx="40" cy="9" rx="4" ry="12" fill="#F0C848"/></g>
            <g class="part-petal part-petal-6"><ellipse cx="40" cy="9" rx="4" ry="12" fill="#F0C848"/></g>
            <g class="part-petal part-petal-7"><ellipse cx="40" cy="9" rx="4" ry="12" fill="#F0C848"/></g>
            <g class="part-petal part-petal-8"><ellipse cx="40" cy="9" rx="4" ry="12" fill="#F0C848"/></g>
            <g class="part-petal part-petal-9"><ellipse cx="40" cy="9" rx="4" ry="12" fill="#F0C848"/></g>
            <g class="part-petal part-petal-10"><ellipse cx="40" cy="9" rx="4" ry="12" fill="#F0C848"/></g>
            <g class="part-petal part-petal-11"><ellipse cx="40" cy="9" rx="4" ry="12" fill="#F0C848"/></g>
          </g>
          <g class="part-center">
            <circle cx="40" cy="22" r="9" fill="#6B4A28"/>
            <circle cx="40" cy="22" r="7" fill="#8B6838"/>
            <circle cx="37" cy="20" r="1" fill="#5A4028" opacity="0.4"/>
            <circle cx="43" cy="21" r="0.8" fill="#5A4028" opacity="0.35"/>
            <circle cx="40" cy="24" r="0.9" fill="#5A4028" opacity="0.35"/>
          </g>
        </svg>
      </div>
      <svg class="wave-line" viewBox="0 0 88 10" aria-hidden="true">
        <path d="M2 6 Q10 2 18 7 Q28 10 38 4 Q48 1 58 6 Q68 10 78 5 Q84 3 86 6"/>
      </svg>
      <div class="loading-percent" id="loading-percent">0%</div>
    </div>
  </div>

  <!-- Page 02 — Forest Entrance -->
  <div class="screen welcome is-hidden" id="welcome">
    <div class="welcome-bg"><div class="paper-texture"></div><div class="pastel-vignette"></div></div>
    <canvas id="welcome-float" aria-hidden="true"></canvas>
    <div class="welcome-center">
      <div class="welcome-logo" aria-hidden="true">
        <svg width="44" height="44" viewBox="0 0 44 44">
          <circle cx="22" cy="16" r="7" fill="#6B4A28"/>
          <circle cx="22" cy="16" r="5" fill="#8B6838"/>
          <ellipse cx="22" cy="6" rx="3" ry="7" fill="#F0C848" transform="rotate(0 22 16)"/>
          <ellipse cx="22" cy="6" rx="3" ry="7" fill="#F0C848" transform="rotate(45 22 16)"/>
          <ellipse cx="22" cy="6" rx="3" ry="7" fill="#F0C848" transform="rotate(90 22 16)"/>
          <ellipse cx="22" cy="6" rx="3" ry="7" fill="#F0C848" transform="rotate(135 22 16)"/>
          <path d="M22 38 Q22 28 22 22" stroke="#5A7848" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
      <button class="forest-window" id="forest-window" aria-label="Enter the forest">
        <div class="window-frame">
          <div class="window-scene">
            <div class="window-scene-inner" id="window-scene-inner">
              <div id="window-forest-mount"></div>
            </div>
          </div>
        </div>
      </button>
      <h1 class="welcome-title"><em>Twelve</em><br />Wishes</h1>
      <p class="welcome-hint">走进森林，寻找 12 朵向日葵。</p>
    </div>
  </div>

  <!-- Page 03 — Long forest scroll -->
  <div class="screen forest-app is-hidden" id="forest-app">
    <div class="paper-texture"></div>
    <div class="pastel-vignette"></div>

    <div class="forest-sunlight" id="forest-sunlight" aria-hidden="true"></div>
    <div class="forest-white-wash" id="forest-white-wash" aria-hidden="true"></div>
    <div class="forest-night-fade" id="forest-night-fade" aria-hidden="true"></div>

    <div class="forest-ui is-hidden" id="forest-ui">
      <button class="hint-lamp" id="hint-lamp" type="button" aria-label="提示">
        <span class="hint-lamp-bulb" aria-hidden="true">
          <svg width="22" height="28" viewBox="0 0 22 28" xmlns="http://www.w3.org/2000/svg">
            <path d="M11 2 C6 2 3 6 3 10.5 C3 14 5.5 16.5 7 19 L7 22 H15 L15 19 C16.5 16.5 19 14 19 10.5 C19 6 16 2 11 2 Z" fill="#F8E8B0" stroke="#9A7B5A" stroke-width="0.8"/>
            <rect x="7" y="23" width="8" height="2.5" rx="1" fill="#C8B090"/>
            <rect x="8" y="25.5" width="6" height="2" rx="1" fill="#9A7B5A"/>
          </svg>
        </span>
        <span class="hint-lamp-label">提示</span>
      </button>
      <div class="flower-bag" id="flower-bag" aria-label="花束背包">
        <div class="bag-icon" id="bag-icon"></div>
        <span class="flower-bag-progress" id="progress-text">0 / 12</span>
      </div>
    </div>

    <div class="dialogue-box" id="dialogue-box" aria-live="polite">
      <div class="dialogue-paper" aria-hidden="true"></div>
      <p class="dialogue-speaker" id="dialogue-speaker">我</p>
      <p class="dialogue-text" id="dialogue-text"></p>
    </div>

    <div class="forest-world" id="forest-world">
      <div class="forest-track" id="forest-track"></div>
    </div>
  </div>

  <!-- Finale -->
  <div class="screen finale-screen is-hidden" id="finale">
    <div class="paper-texture"></div>
    <div class="finale-content">
      <div class="bouquet-stage" id="bouquet-stage"></div>
      <div class="finale-monologue" id="finale-monologue"></div>
      <div class="envelope" id="envelope" title="打开信"></div>
      <div class="letter-panel" id="letter-panel">
        <p>这束向日葵，</p>
        <p>是送给你的。</p>
        <p>希望今天，</p>
        <p>也会有阳光陪着你。</p>
        <p>谢谢你，</p>
        <p>陪我走完这段森林。</p>
      </div>
      <div class="finale-actions">
        <button class="btn-pill" id="btn-restart">再走一次</button>
      </div>
    </div>
  </div>

  <!-- Modals -->
  <div class="modal-overlay" id="botanical-modal">
    <div class="botanical-card" id="botanical-card-content"></div>
  </div>

  <div class="scene-transition" id="scene-transition"></div>

  <script src="js/pastel.js?v=35"></script>
  <script src="js/data/flowers.js?v=124"></script>
  <script src="js/data/act1.js?v=125"></script>
  <script src="js/illustrations.js?v=125"></script>
  <script src="js/collection.js?v=80"></script>
  <script src="js/transitions.js?v=35"></script>
  <script src="js/monologue.js?v=122"></script>
  <script src="js/act3-halos.js?v=100"></script>
  <script src="js/act3-meteors.js?v=104"></script>
  <script src="js/act3-fireflies.js?v=100"></script>
  <script src="js/act4-walk.js?v=125"></script>
  <script src="js/flower-interact.js?v=124"></script>
  <script src="js/butterflies.js?v=84"></script>
  <script src="js/hint-lamp.js?v=70"></script>
  <script src="js/forest-acts.js?v=125"></script>
  <script src="js/forest-world.js?v=122"></script>
  <script src="js/finale.js?v=35"></script>
  <script src="js/loading.js?v=120"></script>
  <script src="js/welcome.js?v=121"></script>
</body>
</html>
